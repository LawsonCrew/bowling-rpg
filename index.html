<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Bowling RPG</title>

<style>

body{
font-family:sans-serif;
background:#111;
color:white;
text-align:center;
}

table{
margin:10px auto;
border-collapse:collapse;
}

td,th{
border:1px solid white;
padding:6px;
width:30px;
}

button{
font-size:18px;
padding:8px;
margin:5px;
}

input{
font-size:18px;
width:60px;
text-align:center;
}

</style>
</head>

<body>

<h1>🎳 Bowling RPG</h1>

<div id="scoreboards"></div>

<h2 id="turn"></h2>

<div>
人数:
<button onclick="startGame(1)">1</button>
<button onclick="startGame(2)">2</button>
<button onclick="startGame(3)">3</button>
<button onclick="startGame(4)">4</button>
</div>

<h2 id="monsterName"></h2>
HP: <span id="hp"></span>

<br><br>

ピン数  
<input id="pins">
<button onclick="roll()">投げる</button>

<h3 id="log"></h3>

<script>

let monsters=[
{name:"ゴブリン",hp:180},
{name:"オーガ",hp:260},
{name:"ドラゴン",hp:340}
]

let players=1
let currentPlayer=0
let playerRolls=[]
let frame=1
let rollInFrame=1

let currentMonster=0
let monsterHP=0
let multiplier=1

function startGame(p){

players=p
currentPlayer=0
frame=1
rollInFrame=1

const table=[1,1.8,2.5,3.2]
multiplier=table[p-1]

currentMonster=0
monsterHP=Math.floor(monsters[0].hp*multiplier)

playerRolls=[]

let area=document.getElementById("scoreboards")
area.innerHTML=""

for(let i=0;i<players;i++){

playerRolls.push([])

area.innerHTML+=createBoard(i)

}

updateMonster()
updateTurn()

}

function createBoard(player){

return `
<h3>Player ${player+1}</h3>

<table>
<tr>
<th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
<th>6</th><th>7</th><th>8</th><th>9</th><th>10</th>
</tr>

<tr id="rolls${player}">
<td></td><td></td><td></td><td></td><td></td>
<td></td><td></td><td></td><td></td><td></td>
</tr>

<tr id="score${player}">
<td colspan="10">0</td>
</tr>

</table>
`

}

function roll(){

let pins=parseInt(document.getElementById("pins").value)

if(isNaN(pins)) return

playerRolls[currentPlayer].push(pins)

updateBoard()

if(pins==10 && rollInFrame==1){

nextFrame()

}else{

if(rollInFrame==2){

nextFrame()

}else{

rollInFrame=2
return

}

}

}

function nextFrame(){

rollInFrame=1
frame++

if(frame>10){

endGame()

return

}

nextPlayer()

}

function nextPlayer(){

currentPlayer++

if(currentPlayer>=players){

currentPlayer=0

}

updateTurn()

}

function updateTurn(){

document.getElementById("turn").innerText=
"Player "+(currentPlayer+1)+" のターン"

}

function updateBoard(){

let rolls=playerRolls[currentPlayer]

let row=document.getElementById("rolls"+currentPlayer)

let cells=row.children

for(let i=0;i<rolls.length && i<10;i++){

cells[i].innerText=rolls[i]

}

let total=rolls.reduce((a,b)=>a+b,0)

document.getElementById("score"+currentPlayer)
.innerText=total

}

function endGame(){

let rolls=playerRolls[currentPlayer]

let score=rolls.reduce((a,b)=>a+b,0)

let strike=rolls.filter(r=>r==10).length

let spare=0

for(let i=0;i<rolls.length;i+=2){

if((rolls[i]||0)+(rolls[i+1]||0)==10 && rolls[i]!=10){

spare++

}

}

let damage=score+(strike*10)+(spare*5)

if(score>=200){

damage=Math.floor(damage*1.5)

}

monsterHP-=damage

let text="⚔️ "+damage+" ダメージ！"

if(monsterHP<=0){

currentMonster++

if(currentMonster>=monsters.length){

text+=" 🐉 全討伐！"

document.getElementById("monsterName").innerText="クリア！"
document.getElementById("hp").innerText="0"
document.getElementById("log").innerText=text

return

}

monsterHP=Math.floor(monsters[currentMonster].hp*multiplier)

text+=" → "+monsters[currentMonster].name+" 出現！"

}

document.getElementById("log").innerText=text

updateMonster()

frame=1
rollInFrame=1
playerRolls[currentPlayer]=[]

updateBoard()

}

function updateMonster(){

document.getElementById("monsterName").innerText=
monsters[currentMonster].name

document.getElementById("hp").innerText=monsterHP

}

</script>

</body>
</html>
