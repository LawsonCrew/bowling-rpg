<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bowling RPG</title>

<style>

body{
font-family:sans-serif;
background:#111;
color:white;
text-align:center;
}

button{
font-size:20px;
padding:10px;
margin:5px;
}

input{
font-size:20px;
width:60px;
text-align:center;
}

#log{
margin-top:20px;
}

</style>

</head>

<body>

<h1>🎳 Bowling RPG</h1>

<div>
人数:
<button onclick="startGame(1)">1</button>
<button onclick="startGame(2)">2</button>
<button onclick="startGame(3)">3</button>
<button onclick="startGame(4)">4</button>
</div>

<h2 id="monsterName"></h2>
HP: <span id="hp"></span>

<h2>現在のゲーム</h2>

投球ピン数  
<input id="pins">
<button onclick="roll()">投げる</button>

<h3>ゲームスコア: <span id="score">0</span></h3>

<h3>投球履歴</h3>
<p id="rolls"></p>

<h3 id="log"></h3>

<script>

let monsters=[
{name:"ゴブリン",hp:180},
{name:"オーガ",hp:260},
{name:"ドラゴン",hp:340}
]

let currentMonster=0
let monsterHP=0
let multiplier=1

let rolls=[]
let score=0
let frame=1
let rollInFrame=1

function startGame(players){

const table=[1,1.8,2.5,3.2]

multiplier=table[players-1]

currentMonster=0
monsterHP=Math.floor(monsters[0].hp*multiplier)

resetGame()

updateMonster()

}

function resetGame(){

rolls=[]
score=0
frame=1
rollInFrame=1

updateScore()

}

function roll(){

let pins=parseInt(document.getElementById("pins").value)

if(isNaN(pins)) return

rolls.push(pins)

score+=pins

updateScore()

if(pins==10 && rollInFrame==1){

frame++

}else{

if(rollInFrame==2){

frame++
rollInFrame=1

}else{

rollInFrame=2
return

}

}

rollInFrame=1

if(frame>10){

attack()

}

}

function updateScore(){

document.getElementById("score").innerText=score
document.getElementById("rolls").innerText=rolls.join(" , ")

}

function attack(){

let strikeCount=rolls.filter(r=>r==10).length

let spareCount=0

for(let i=0;i<rolls.length;i+=2){

if(rolls[i]+(rolls[i+1]||0)==10 && rolls[i]!=10){

spareCount++

}

}

let damage=score+(strikeCount*10)+(spareCount*5)

if(score>=200){

damage=Math.floor(damage*1.5)

}

monsterHP-=damage

let text="⚔️ "+damage+" ダメージ！"

if(monsterHP<=0){

currentMonster++

if(currentMonster>=monsters.length){

text+=" 🐉 全討伐！"

document.getElementById("monsterName").innerText="クリア！"
document.getElementById("hp").innerText="0"

document.getElementById("log").innerText=text

return

}

monsterHP=Math.floor(monsters[currentMonster].hp*multiplier)

text+=" → "+monsters[currentMonster].name+" 出現！"

}

document.getElementById("log").innerText=text

updateMonster()

resetGame()

}

function updateMonster(){

document.getElementById("monsterName").innerText=monsters[currentMonster].name
document.getElementById("hp").innerText=monsterHP

}

</script>

</body>
</html>
